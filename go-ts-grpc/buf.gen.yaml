version: v2

clean: true

plugins:
  - local: protoc-gen-go
    out: server/gen
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: server/gen
    opt:
      - paths=source_relative

  - local: client/node_modules/.bin/protoc-gen-ts_proto
    out: client/gen
    strategy: all
    opt:
      - outputServices=grpc-js
      - esModuleInterop=true
      - useExactTypes=false
